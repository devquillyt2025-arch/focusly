<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focusly - Your Personal Productivity Hub</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="app-container glass-panel">
        <header>
            <h1><i class="fa-solid fa-leaf"></i> Focusly</h1>
            <p>Master your time, achieve your goals.</p>
        </header>

        <main>
            <section class="timer-section">
                <div class="timer-nav">
                    <button class="nav-btn active" id="btn-pomodoro">Pomodoro</button>
                    <button class="nav-btn" id="btn-short-break">Short Break</button>
                    <button class="nav-btn" id="btn-long-break">Long Break</button>
                    <button class="nav-btn" id="btn-custom">Custom</button>
                </div>
                
                <div class="timer-display glass-panel-inner">
                    <div class="time-left" id="time-left">25:00</div>
                    <div class="progress-ring-container">
                        <svg class="progress-ring" viewBox="0 0 240 240" width="100%" height="100%">
                            <circle class="progress-ring__circle" stroke="white" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
                        </svg>
                    </div>
                </div>
                <div class="timer-controls">
                    <button id="start-btn" class="control-btn primary-btn"><i class="fa-solid fa-play"></i> Start</button>
                    <button id="reset-btn" class="control-btn secondary-btn"><i class="fa-solid fa-rotate-right"></i> Reset</button>
                </div>
            </section>

            <section class="tasks-section">
                <h2>Tasks</h2>
                <div class="task-input-container">
                    <input type="text" id="task-input" placeholder="What are you working on?">
                    <button id="add-task-btn" class="icon-btn"><i class="fa-solid fa-plus"></i></button>
                </div>
                <ul id="task-list" class="task-list">
                    <!-- Tasks will be injected here via JS -->
                </ul>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
